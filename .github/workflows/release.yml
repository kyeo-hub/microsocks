name: Release Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      
      - name: Build binary (static)
        run: |
          make clean
          LDFLAGS="-static" make
      
      - name: Generate checksums
        run: |
          sha256sum microsocks > SHA256SUMS
          cat SHA256SUMS
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            microsocks
            SHA256SUMS
          draft: false
          prerelease: false
          body: |
            # MicroSocks Linux Release
            
            Statically linked binary for Linux x64.
            
            ## Quick Start
            ```bash
            wget https://github.com/rofl0r/microsocks/releases/download/${{ github.ref_name }}/microsocks
            chmod +x microsocks
            ./microsocks -i 0.0.0.0 -p 1080 -u user -P pass
            ```
            
            ## Verification
            ```bash
            sha256sum -c SHA256SUMS
            ```
